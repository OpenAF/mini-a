modes:

  shell:
    description: "Read-only mode for shell commands"
    params     :
      useshell: true

  shellrw:
    include    : shell
    description: "Read-write mode for shell commands"
    params     :
      useutils       : true
      readwrite      : true
      shellallowpipes: true
      shellbatch     : true
      showexecs      : true
      mini-a-docs    : true

  utils:
    description: "Utilities mode"
    params     :
      useutils   : true
      mini-a-docs: true
      usetools   : true

  shellutils:
    include    : shell
    description: "Shell + utilities mode"
    params     :
      useutils   : true
      mini-a-docs: true
      usetools   : true

  internet:
    description: "Internet access mode"
    params     :
      usetools   : true
      mini-a-docs: true
      mcp        :
      - type   : ojob
        options:
          job: mcps/mcp-time.yaml
      - type   : ojob
        options:
          job: mcps/mcp-web.yaml
      - type   : ojob
        options:
          job: mcps/mcp-weather.yaml
      - type   : ojob
        options:
          job: mcps/mcp-net.yaml
      mcpproxy : true

  news:
    include    : internet
    description: "News from the internet mode"
    params     :
      mcp        :
      - type   : ojob
        options:
          job: mcps/mcp-time.yaml
      - type   : ojob
        options:
          job: mcps/mcp-web.yaml
      - type   : ojob
        options:
          job: mcps/mcp-rss.yaml
      mcpproxy : true

  poweruser:
    description: "Power user mode"
    params     :
      useascii         : true
      usetools         : true
      useplanning      : false
      useshell         : true
      readwrite        : true
      useutils         : true
      useskills        : true
      usestream        : true
      mcpproxy         : true
      mini-a-docs      : true
      toolcachettl     : 5000
      mcpproxythreshold: 51200
      mcpproxytoon     : true
      mcpprogcall      : false
      llmcomplexity    : true
      usehistory       : true
      historykeep      : true
      historykeepperiod: 10080
      modelstrategy    : advisor
      memoryusersession: true
      usedelegation    : true
      autodelegation   : true
      mcp              : 
      - type   : ojob
        options:
          job: mcps/mcp-web.yaml 

  chatbot:
    description: "Chatbot mode"
    params     :
      chatbotmode: true
      usestream  : true

  web    :
    description: "Web mode with tools"
    params     :
      usetools   : true
      usediagrams: true
      usecharts  : true
      usemaps    : true
      usevectors : true
      usemath    : true
      usehistory : true
      useattach  : true
      mcpproxy   : true
      mcpproxythreshold: 51200
      mcpproxytoon     : true
      mcp              :
      - type   : ojob
        options:
          job: mcps/mcp-web.yaml
      - type   : ojob
        options:
          job: mcps/mcp-weather.yaml
      - type   : ojob
        options:
          job: mcps/mcp-time.yaml
      - type   : ojob
        options:
          job: mcps/mcp-net.yaml

  webfull:
    include    : web
    description: "Web full mode"
    params     :
      useascii   : false
      usestream  : true
      historykeep: true
      useplanning: false 
      llmcomplexity    : true
      historykeepperiod: 10080
      historykeepcount : 15
      mcp              :
      - type   : ojob
        options:
          job: mcps/mcp-web.yaml
      - type   : ojob
        options:
          job: mcps/mcp-weather.yaml
      - type   : ojob
        options:
          job: mcps/mcp-rss.yaml
      - type   : ojob
        options:
          job: mcps/mcp-time.yaml
      - type   : ojob
        options:
          job: mcps/mcp-fin.yaml
      - type   : ojob
        options:
          job: mcps/mcp-net.yaml
      - type   : ojob
        options:
          job: mcps/mcp-oaf.yaml
      - type   : ojob
        options:
          job: mcps/mcp-oafp.yaml
