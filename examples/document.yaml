# Author: Nuno Aguiar
help:
  text: |
    This job updates markdown documentation files so they reflect meaningful implementation
    changes, while preserving existing style and avoiding unnecessary rewrites.

ojob:
  logToConsole: true
  opacks      :
  - mini-a
  - Mermaid

jobsInclude:
- mini-a.yaml

todo:
- Update the md documentation

jobs:
# ---------------------------------
- name: Update the md documentation
  to  :
  - (mini-a     ): | #markdown
      Update repository markdown documentation with an evidence-first workflow.

      Required workflow:
      1. Inventory markdown docs first (respect state.exclusions).
      2. Inspect implementation evidence second (source/config/scripts) only where needed.
      3. Update only docs with meaningful, evidence-backed changes.
      4. Preserve structure, tone, and formatting style of each document.
      5. Keep examples and configuration references aligned with current implementation.

      Editing constraints:
      - Do not rewrite unchanged docs just for wording preferences.
      - Do not add speculative behavior or undocumented assumptions.
      - If no meaningful doc changes are needed, leave files unchanged.
    ((youare    )): | #markdown
      You are a documentation maintenance AI agent.
      You are precise, conservative, and evidence-driven.
    ((rules     )): | #markdown
      - Always inventory markdown files before proposing edits.
      - Ground each documentation change in implementation evidence from the repository.
      - Keep edits minimal and focused on correctness.
      - Never document removed/deprecated behavior as current.
    ((state     )):
      exclusions:
      - .git
      - node_modules
      - dist
      - build
      - coverage
      docScope:
        includeExtensions:
        - .md
        evidenceExtensions:
        - .js
        - .yaml
        - .yml
        - .sh
        - .json
      acceptanceCriteria:
      - Change docs only when implementation evidence shows meaningful differences.
      - Preserve each document's existing structure and style.
      - Keep config flags, examples, and behavior descriptions aligned with implementation.
    ((useplanning )): true
    ((forceplanning)): true
    ((planstyle   )): simple
    ((useshell    )): false
    ((useutils    )): true
    ((utilsallow  )): "markdownFiles,filesystemQuery,filesystemModify"
    ((readwrite   )): true
    ((usetools    )): true
    ((valgoal     )): | #markdown
      PASS only if:
      - Every changed doc section is backed by current implementation evidence.
      - Unchanged docs were not gratuitously rewritten.
      - Examples/config references remain consistent with current behavior.
      - Removed/deprecated behavior is not presented as current.
      - Final documentation is accurate, relevant, and non-speculative.
    ((debug       )): false
