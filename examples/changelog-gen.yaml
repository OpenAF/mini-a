# Author: Nuno Aguiar
help:
  text: |
    OpenAF oJob example of having Mini-A (mini AI agent) generate a formatted CHANGELOG.md from git commit history.
    The changelog groups commits by type (features, fixes, chores, docs, etc.) and formats them in a clean,
    readable markdown structure following conventional changelog patterns.

ojob:
  logToConsole: true
  opacks      :
  - mini-a

jobsInclude:
- mini-a.yaml

todo:
- Generate CHANGELOG.md

jobs:
# ---------------------------
- name: Generate CHANGELOG.md
  to:
  - (mini-a           ): | #markdown
      Your task is to CREATE and WRITE a changelog by analyzing git commit history.

      IMPORTANT: You must EXECUTE commands and WRITE files using the available tools. Do NOT only describe steps.

      Required workflow:
      1. Gather commit data first for the intended window:
         - Use commits from the last 50 commits and from the last 6 months.
         - Keep the more recent scope (the smaller resulting set).
      2. Classify commits consistently using these rules:
         - Breaking Changes: BREAKING:, breaking:, major:
         - Features: feat:, feature:, add:, new:
         - Fixes: fix:, bugfix:, bug:, patch:, hotfix:
         - Documentation: docs:, doc:, documentation:
         - Chores: chore:, build:, ci:, refactor:, style:, test:
         - Other: commits without recognized prefixes
      3. Normalize commit messages by removing recognized prefixes and truncating messages over state.output.maxMessageChars characters.
      4. Format each entry exactly as:
         - **[short-hash]**: [message] ([date], by [author])
      5. Group sections in the exact order from state.classification.sectionOrder.
      6. Sort commits within each section by date (newest first).
      7. Write final markdown content to state.output.file.

      Constraints:
      - Do not invent commits, dates, authors, or metadata.
      - If metadata is missing in git history, keep only what is available.
      - Output must be deterministic and valid markdown.
    ((youare         )): | #markdown
      You are a technical writer AI agent specialized in generating deterministic CHANGELOG.md files from git history.
      You must use shell and file-writing tools to perform real actions.
    ((rules          )): | #markdown
      - ALWAYS use shell commands to retrieve git history.
      - Use portable git commands and deterministic ordering.
      - Ensure the final output is valid markdown and written to file.
      - Never fabricate missing metadata.
    ((state          )):
      classification:
        sectionOrder:
        - Breaking Changes
        - Features
        - Fixes
        - Documentation
        - Chores
        - Other
      output:
        file: CHANGELOG.md
        maxMessageChars: 100
      window:
        maxCommits: 50
        maxMonths: 6
    ((useplanning    )): true
    ((forceplanning  )): true
    ((planstyle      )): simple
    ((useshell       )): true
    ((usesandbox     )): auto
    ((shelltimeout   )): 120000
    ((shellmaxbytes  )): 16000
    ((shellbatch     )): true
    ((shellallowpipes)): true
    ((readwrite      )): true
    ((usetools       )): true
    ((outfile        )): CHANGELOG.md
    ((format         )): md
    ((valgoal        )): | #markdown
      PASS only if:
      - All commits in scope are included exactly once.
      - Section grouping follows state.classification rules and order.
      - Commit message cleanup is applied consistently.
      - Output is valid markdown and written to CHANGELOG.md.
      - No commits, dates, authors, or metadata were invented.
    ((debug          )): false
