  to  : oJob Test
  exec: args.func = args.tests.testDreamMemoryMergesDuplicates

- name: MiniA Dreams Tests::MarksStale
  from: MiniA Dreams Tests::Init
  to  : oJob Test
  exec: args.func = args.tests.testDreamMemoryMarksStale

