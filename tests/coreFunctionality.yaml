jobs:
- name: MiniA Core Tests::Init
  exec: args.tests = require("tests/coreFunctionality.js")

- name: MiniA Core Tests::CleanCodeBlocks
  from: MiniA Core Tests::Init
  to  : oJob Test
  exec: args.func = args.tests.testCleanCodeBlocks

- name: MiniA Core Tests::ExtractFinalAction
  from: MiniA Core Tests::Init
  to  : oJob Test
  exec: args.func = args.tests.testExtractEmbeddedFinalAction

- name: MiniA Core Tests::ToolCacheKeys
  from: MiniA Core Tests::Init
  to  : oJob Test
  exec: args.func = args.tests.testBuildToolCacheKeyRespectsKeyFields

- name: MiniA Core Tests::CategorizeError
  from: MiniA Core Tests::Init
  to  : oJob Test
  exec: args.func = args.tests.testCategorizeErrorDetection

- name: MiniA Core Tests::ErrorHistory
  from: MiniA Core Tests::Init
  to  : oJob Test
  exec: args.func = args.tests.testUpdateErrorHistoryRetention

- name: MiniA Core Tests::NormalizeToolResult
  from: MiniA Core Tests::Init
  to  : oJob Test
  exec: args.func = args.tests.testNormalizeToolResultVariants

- name: MiniA Core Tests::UtilsMcpSkillsToggle
  from: MiniA Core Tests::Init
  to  : oJob Test
  exec: args.func = args.tests.testUtilsMcpSkillsToggle

- name: MiniA Core Tests::UtilsMcpAllowAndDeny
  from: MiniA Core Tests::Init
  to  : oJob Test
  exec: args.func = args.tests.testUtilsMcpAllowAndDenyFilters

- name: MiniA Core Tests::LinuxSandboxWarnsWhenMissing
  from: MiniA Core Tests::Init
  to  : oJob Test
  exec: args.func = args.tests.testLinuxSandboxWarnsWhenBwrapMissing

- name: MiniA Core Tests::LinuxSandboxWritableBinds
  from: MiniA Core Tests::Init
  to  : oJob Test
  exec: args.func = args.tests.testLinuxSandboxAddsWritableBinds

- name: MiniA Core Tests::LinuxSandboxNoNetwork
  from: MiniA Core Tests::Init
  to  : oJob Test
  exec: args.func = args.tests.testLinuxSandboxCanDisableNetwork

- name: MiniA Core Tests::MacSandboxRestrictiveProfile
  from: MiniA Core Tests::Init
  to  : oJob Test
  exec: args.func = args.tests.testMacSandboxGeneratesRestrictiveProfile

- name: MiniA Core Tests::MacSandboxNoNetwork
  from: MiniA Core Tests::Init
  to  : oJob Test
  exec: args.func = args.tests.testMacSandboxCanDisableNetwork

- name: MiniA Core Tests::WindowsSandboxBestEffort
  from: MiniA Core Tests::Init
  to  : oJob Test
  exec: args.func = args.tests.testWindowsSandboxBuildsBestEffortExecution

- name: MiniA Core Tests::WindowsSandboxNoNetwork
  from: MiniA Core Tests::Init
  to  : oJob Test
  exec: args.func = args.tests.testWindowsSandboxBestEffortNoNetwork

- name: MiniA Core Tests::MacSandboxReuseWarning
  from: MiniA Core Tests::Init
  to  : oJob Test
  exec: args.func = args.tests.testMacSandboxReuseWarningIsDebugOnly

include:
- oJobTest.yaml

ojob:
  opacks:
  - oJob-common

