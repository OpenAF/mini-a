# Author: OpenAI Assistant, Nuno Aguiar
help:
  text   : A STDIO/HTTP MCP generic browse server backed by the oJob-common HTTP Browse API
  expects:
  - name     : browseAPIURL
    desc     : Base URL of a HTTP Browse API endpoint
    example  : "http://127.0.0.1:8091/api/browse"
    mandatory: true
  - name     : browseUri
    desc     : Target browse URI exposed by the HTTP Browse API
    example  : "/files"
    mandatory: true
  - name     : label
    desc     : Human-readable label injected into tool descriptions (defaults to browseUri)
    example  : "Local files"
    mandatory: false
  - name     : toolPrefix
    desc     : Optional prefix prepended to all tool names (e.g. "files-" -> files-list, files-get, files-info)
    example  : "files-"
    mandatory: false
  - name     : headers
    desc     : Optional HTTP headers map sent to the HTTP Browse API on every request
    example  : "(Authorization: Bearer ...)"
    mandatory: false
  - name     : defaultParams
    desc     : Optional query parameters map merged into every Browse API request
    example  : "(pageSize: 100)"
    mandatory: false
  - name     : onport
    desc     : If defined starts an HTTP MCP server on this port; otherwise uses STDIO
    example  : "8888"
    mandatory: false

todo:
- Init
- (if    ): "isDef(args.onport)"
  ((then)):
  - (httpdStart   ): "${onport:-8080}"
  - (httpdHealthz ): "${onport:-8080}"
  - (httpdMetrics ): "${onport:-8080}"
  - (httpdMCP     ): "${onport:-8080}"
    ((toolPrefix )): "${toolPrefix:-}"
    ((tplDesc    )): true
    ((description)): &MCPSERVER
      serverInfo:
        name   : mini-a-oaf-browse
        title  : OpenAF mini-a MCP browse server for {{label}}
        version: 1.0.0
    ((fnsMeta)): &MCPFNSMETA
      list:
        name       : list
        description: "List entries from {{label}} via the HTTP Browse API target {{browseUri}}."
        inputSchema:
          type      : object
          properties:
            path:
              type       : string
              description: Relative path under {{browseUri}} to list. Defaults to the target root.
            params:
              type       : object
              description: Optional query parameters merged into the Browse API request (e.g. page, pageSize or target-specific filters).
          required: [ ]
        annotations:
          title         : list
          readOnlyHint  : true
          idempotentHint: true

      get:
        name       : get
        description: "Get an object from {{label}} via the HTTP Browse API target {{browseUri}}."
        inputSchema:
          type      : object
          properties:
            path:
              type       : string
              description: Relative path under {{browseUri}} to retrieve.
            params:
              type       : object
              description: Optional query parameters merged into the Browse API request.
          required: [ path ]
        annotations:
          title         : get
          readOnlyHint  : true
          idempotentHint: true

    ((fns    )): &MCPFNS
      list: Browse list
      get : Browse get
      
  ((else)):
  - (stdioMCP  ): *MCPSERVER
    ((toolPrefix)): "${toolPrefix:-}"
    ((tplDesc   )): true
    ((fnsMeta   )): *MCPFNSMETA
    ((fns       )): *MCPFNS

ojob:
  opacks      :
  - openaf     : 20250915
  - oJob-common: 20250914
  catch       : printErrnl("[" + job.name + "] "); $err(exception, __, __, job.exec)
  logToConsole: false
  argsFromEnvs: true
  daemon      : true
  unique      :
    pidFile     : .mcp-oaf-browse.pid
    killPrevious: true

include:
- oJobMCP.yaml

jobs:
# -----------
- name : Init
  check:
    in:
      label       : isString.default("")
      headers     : isMap.default(__)
      defaultParams: isMap.default({})
  exec : | #js
    if (isUnDef(global.__browseApiCall__)) {

      _$(args.browseAPIURL, "browseAPIURL").isString().$_()
      _$(args.browseUri, "browseUri").isString().$_()    

      global.__browseAPIURL__      = String(args.browseAPIURL).replace(/\/+$/, "")
      global.__browseTargetUri__   = String(args.browseUri).startsWith("/") ? String(args.browseUri) : "/" + String(args.browseUri)
      global.__browseLabel__       = (isString(args.label) && args.label.length > 0 ? args.label : global.__browseTargetUri__)
      global.__browseApiHeaders__  = isMap(args.headers) ? clone(args.headers) : __
      global.__browseDefaultParams__ = isMap(args.defaultParams) ? clone(args.defaultParams) : {}

      args.browseAPIURL = global.__browseAPIURL__
      args.browseUri    = global.__browseTargetUri__
      args.label        = global.__browseLabel__

      global.__browseApiCall__ = function(action, path, params) {
        var _query = merge({
          action   : action,
          browseUri: global.__browseTargetUri__
        }, isMap(global.__browseDefaultParams__) ? clone(global.__browseDefaultParams__) : {})

        if (isString(path) && path.length > 0) _query.path = path
        if (isMap(params)) _query = merge(_query, params)

        var _pairs = []
        Object.keys(_query).forEach(function(k) {
          if (isUnDef(_query[k])) return

          var _value = _query[k]
          if (isMap(_value) || isArray(_value)) _value = stringify(_value, __, "")
          _pairs.push(encodeURIComponent(k) + "=" + encodeURIComponent(String(_value)))
        })

        var _url = global.__browseAPIURL__ + (_pairs.length > 0 ? "?" + _pairs.join("&") : "")
        var _response = $rest({
          requestHeaders : global.__browseApiHeaders__,
          throwExceptions: true
        }).get(_url)

        if (isString(_response)) {
          var _trimmed = _response.trim()
          if ((_trimmed.startsWith("{") && _trimmed.endsWith("}")) || (_trimmed.startsWith("[") && _trimmed.endsWith("]"))) {
            try {
              return jsonParse(_response)
            } catch(__e) {}
          }
        }

        return _response
      }
    }

# ------------------
- name : Browse list
  from : Init
  check:
    in:
      path  : isString.default("")
      params: isMap.default({})
  exec : | #js
    var _res = global.__browseApiCall__("list", args.path, args.params)
    return _res.list

# -----------------
- name : Browse get
  from : Init
  check:
    in:
      path  : isString
      params: isMap.default({})
  exec : | #js
    return global.__browseApiCall__("obj", args.path, args.params)
