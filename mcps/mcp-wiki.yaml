# Author: OpenAI Assistant
help:
  text   : A standalone STDIO/HTTP MCP wiki knowledge base server (read-only)
  expects:
  - name     : onport
    desc     : If defined starts an HTTP MCP server on this port; otherwise uses STDIO
    example  : "8888"
    mandatory: false
  - name     : wikibackend
    desc     : Wiki backend type (fs, s3, s3fs or es)
    example  : "fs"
    mandatory: false
  - name     : wikiroot
    desc     : "Base directory for fs backend (default: current directory)"
    example  : "./wiki"
    mandatory: false
  - name     : wikibucket
    desc     : S3 bucket for s3 backend
    example  : "my-wiki-bucket"
    mandatory: false
  - name     : wikiprefix
    desc     : S3 key prefix for s3/s3fs backend, or Elasticsearch index for es backend
    example  : "wiki/"
    mandatory: false
  - name     : wikiurl
    desc     : S3 endpoint/base URL for s3/s3fs, or Elasticsearch/OpenSearch base URL for es (internal esurl)
    example  : "https://s3.amazonaws.com"
    mandatory: false
  - name     : wikiaccesskey
    desc     : S3 access key, or Elasticsearch username for es backend
    mandatory: false
  - name     : wikisecret
    desc     : S3 secret key, or Elasticsearch password for es backend
    mandatory: false
  - name     : wikiregion
    desc     : S3 region
    mandatory: false
  - name     : wikiuseversion1
    desc     : Force S3 signature version 1
    example  : "false"
    mandatory: false
  - name     : wikiignorecertcheck
    desc     : Ignore TLS cert validation on S3 endpoint
    example  : "false"
    mandatory: false
  - name     : toolPrefix
    desc     : Optional prefix prepended to all tool names (e.g. "docs-" -> docs-list, docs-read, ...)
    example  : "wiki-"
    mandatory: false
  - name     : label
    desc     : Human-readable wiki label injected into templated tool descriptions
    example  : "Team wiki"
    mandatory: true
  - name     : wikimounts
    desc     : "SLON/JSON array of read-only wiki mounts: [{name, backend, root|bucket|prefix|url|...}]"
    example  : "[{name: 'team', backend: 'fs', root: './team-wiki'}]"
    mandatory: false
  - name     : usewikigraph
    desc     : "Enable the wiki knowledge graph. Also enabled automatically when `wikigraphfalkorhost` is provided. Search transparently appends related-page hints."
    example  : "false"
    mandatory: false
  - name     : wikigraphfalkorhost
    desc     : FalkorDB host for graph-backed wiki state and queries. Also enables the wiki graph automatically.
    mandatory: false
  - name     : wikigraphfalkorport
    desc     : FalkorDB port
    example  : "6379"
    mandatory: false
  - name     : wikigraphfalkorgraph
    desc     : FalkorDB graph name
    example  : "mini_a_wiki"
    mandatory: false
  - name     : wikigraphfalkoruser
    desc     : FalkorDB username
    mandatory: false
  - name     : wikigraphfalkorpass
    desc     : FalkorDB password
    mandatory: false
  - name     : wikigraphsearchhints
    desc     : Append graph-related pages to search results when the wiki graph is enabled
    example  : "true"
    mandatory: false
  - name     : wikigraphhintcap
    desc     : Maximum graph-hint pages appended to search results
    example  : "5"
    mandatory: false

todo:
- Init
- (if    ): "isDef(args.onport)"
  ((then)):
  - (httpdStart   ): "${onport:-8080}"
  - (httpdHealthz ): "${onport:-8080}"
  - (httpdMetrics ): "${onport:-8080}"
  - (httpdMCP     ): "${onport:-8080}"
    ((toolPrefix )): "${toolPrefix:-}"
    ((tplDesc    )): true
    ((description)): &MCPSERVER
      serverInfo:
        name   : mcp-wiki
        title  : OpenAF standalone MCP wiki server
        version: 1.0.0
    ((fnsMeta)): &MCPFNSMETA
      context:
        name       : context
        description: "[ORIENTATION] Get a compact overview of {{label}}: page count, sections, mounts, and recent changes. Call this once at the start of any wiki task before searching or reading."
        inputSchema:
          type      : object
          properties: {}
        annotations:
          title         : context
          readOnlyHint  : true
          idempotentHint: true

      search:
        name       : search
        description: "[START HERE] Search {{label}} pages. Always call this before read. Returns path+title+description per match (no full page content). Then call read() with the most relevant path."
        inputSchema:
          type      : object
          properties:
            query:
              type       : string
              description: Text query to search in page metadata/body.
            limit:
              type       : integer
              description: Maximum number of search results.
              default    : 20
            caseSensitive:
              type       : boolean
              description: Enable case-sensitive matching.
              default    : false
            regex:
              type       : boolean
              description: Treat query as a regular expression.
              default    : false
            contextLines:
              type       : integer
              description: "Number of context lines before/after each match (>0 enables full per-line snippet mode)."
              default    : 0
            path:
              type       : string
              description: Optional single page path to scope the search.
          required  : [ query ]
        annotations:
          title         : search
          readOnlyHint  : true
          idempotentHint: true

      read:
        name       : read
        description: "Read a page from {{label}} by path. For long pages: call with countLines=true first, then with section= to read only the relevant heading. Never read a full page when a section read suffices."
        inputSchema:
          type      : object
          properties:
            path:
              type       : string
              description: "Wiki page path to read. Use @name/path.md for mounted wikis."
            startLine:
              type       : integer
              description: Optional 1-based start line to read from.
            endLine:
              type       : integer
              description: Optional 1-based end line to read to.
            section:
              type       : string
              description: Read only the body under this heading name (faster for long pages).
            countLines:
              type       : boolean
              description: Return only the total line count without body content.
              default    : false
            compact:
              type       : boolean
              description: Return compact output (path/title/body only).
              default    : false
          required  : [ path ]
        annotations:
          title         : read
          readOnlyHint  : true
          idempotentHint: true

      browse:
        name       : browse
        description: "Explore the section structure of {{label}}. Use after search() fails or for navigation. Less efficient than search for targeted lookup. Shows mounts as virtual top-level sections."
        inputSchema:
          type      : object
          properties:
            path:
              type       : string
              description: "Optional section folder or @name/ mount prefix."
            compact:
              type       : boolean
              description: Return compact navigation output.
              default    : true
        annotations:
          title         : browse
          readOnlyHint  : true
          idempotentHint: true

      list:
        name       : list
        description: "List pages in {{label}}. Use withMeta=true to get path+title+description+type+updated per page — efficient for scanning the full page inventory in one call."
        inputSchema:
          type      : object
          properties:
            path:
              type       : string
              description: Optional path prefix to filter pages.
            withMeta:
              type       : boolean
              description: Return metadata (title, description, type, updated) per page.
              default    : false
            limit:
              type       : integer
              description: Maximum pages to return when withMeta=true.
              default    : 200
        annotations:
          title         : list
          readOnlyHint  : true
          idempotentHint: true

    ((fns    )): &MCPFNS
      context: Wiki context overview
      search : Wiki search pages
      read   : Wiki read page
      browse : Wiki browse section
      list   : Wiki list pages
  ((else)):
  - (stdioMCP  ): *MCPSERVER
    ((toolPrefix)): "${toolPrefix:-}"
    ((tplDesc   )): true
    ((fnsMeta   )): *MCPFNSMETA
    ((fns       )): *MCPFNS

ojob:
  opacks      :
  - openaf     : 20250915
  - oJob-common: 20250914
  - mini-a     : 20260612
  catch       : printErrnl("[" + job.name + "] "); $err(exception, __, __, job.exec)
  logToConsole: false
  argsFromEnvs: true
  daemon      : true
  unique      :
    pidFile     : .mcp-wiki.pid
    killPrevious: true

include:
- oJobMCP.yaml

jobs:
- name : Init
  check:
    in:
      wikibackend         : isString.default("fs")
      wikiroot            : isString.default(__)
      wikibucket          : isString.default(__)
      wikiprefix          : isString.default("wiki/")
      wikiurl             : isString.default("https://s3.amazonaws.com")
      wikiaccesskey       : isString.default(__)
      wikisecret          : isString.default(__)
      wikiregion          : isString.default(__)
      wikiuseversion1     : toBoolean.isBoolean.default(false)
      wikiignorecertcheck : toBoolean.isBoolean.default(false)
      usewikigraph        : toBoolean.isBoolean.default(false)
      wikigraphfalkorhost : isString.default(__)
      wikigraphfalkorport : toNumber.isNumber.default(__)
      wikigraphfalkorgraph: isString.default(__)
      wikigraphfalkoruser : isString.default(__)
      wikigraphfalkorpass : isString.default(__)
      wikigraphsearchhints: toBoolean.isBoolean.default(__)
      wikigraphhintcap    : toNumber.isNumber.default(__)
      label               : isString.default("wiki")
      wikimounts          : isString.default(__)
  exec : | #js
    loadLib("mini-a-mcp-wiki.js")
    __miniAMcpWikiInit(args, {
      access   : "ro",
      readonly : true,
      logPrefix: "mcp-wiki"
    })

- name : Wiki context overview
  check:
    in: {}
  exec : | #js
    return global.__wikiTool.wiki({ operation: "context" })

- name : Wiki list pages
  check:
    in:
      path    : isString.default("")
      withMeta: toBoolean.isBoolean.default(false)
      limit   : toNumber.isNumber.default(200)
      compact : toBoolean.isBoolean.default(false)
  exec : | #js
    return global.__wikiTool.wiki({
      operation: "list",
      path     : args.path,
      withMeta : args.withMeta,
      limit    : args.limit,
      compact  : args.compact
    })

- name : Wiki tree
  check:
    in:
      path   : isString.default("")
      depth  : toNumber.isNumber.default(3)
      compact: toBoolean.isBoolean.default(true)
  exec : | #js
    return global.__wikiTool.wiki({
      operation: "tree",
      path     : args.path,
      depth    : args.depth,
      compact  : args.compact
    })

- name : Wiki browse section
  check:
    in:
      path   : isString.default("")
      compact: toBoolean.isBoolean.default(true)
  exec : | #js
    return global.__wikiTool.wiki({
      operation: "browse",
      path     : args.path,
      compact  : args.compact
    })

- name : Wiki read page
  check:
    in:
      path      : isString
      startLine : toNumber.isNumber.default(__)
      endLine   : toNumber.isNumber.default(__)
      section   : isString.default(__)
      countLines: toBoolean.isBoolean.default(false)
      compact   : toBoolean.isBoolean.default(false)
  exec : | #js
    return global.__wikiTool.wiki({
      operation : "read",
      path      : args.path,
      lineStart : args.startLine,
      lineEnd   : args.endLine,
      section   : args.section,
      countLines: args.countLines,
      compact   : args.compact
    })

- name : Wiki search pages
  check:
    in:
      query        : isString
      limit        : toNumber.isNumber.default(20)
      caseSensitive: toBoolean.isBoolean.default(false)
      regex        : toBoolean.isBoolean.default(false)
      contextLines : toNumber.isNumber.default(0)
      path         : isString.default("")
  exec : | #js
    return global.__wikiTool.wiki({
      operation    : "search",
      query        : args.query,
      limit        : args.limit,
      caseSensitive: args.caseSensitive,
      regex        : args.regex,
      contextLines : args.contextLines,
      path         : args.path,
      compact      : args.contextLines === 0
    })

- name : Wiki backlinks
  check:
    in:
      path   : isString
      compact: toBoolean.isBoolean.default(true)
  exec : | #js
    return global.__wikiTool.wiki({
      operation: "backlinks",
      path     : args.path,
      compact  : args.compact
    })
