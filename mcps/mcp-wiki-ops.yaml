# Author: OpenAI Assistant
help:
  text   : A standalone STDIO/HTTP MCP wiki operations server (lint + readwrite maintenance)
  expects:
  - name     : onport
    desc     : If defined starts an HTTP MCP server on this port; otherwise uses STDIO
    example  : "8888"
    mandatory: false
  - name     : wikibackend
    desc     : Wiki backend type (fs, s3, s3fs or es)
    example  : "fs"
    mandatory: false
  - name     : wikiroot
    desc     : "Base directory for fs backend (default: current directory)"
    example  : "./wiki"
    mandatory: false
  - name     : wikibucket
    desc     : S3 bucket for s3 backend
    example  : "my-wiki-bucket"
    mandatory: false
  - name     : wikiprefix
    desc     : S3 key prefix for s3/s3fs backend, or Elasticsearch index for es backend
    example  : "wiki/"
    mandatory: false
  - name     : wikiurl
    desc     : S3 endpoint/base URL for s3/s3fs, or Elasticsearch/OpenSearch base URL for es (internal esurl)
    example  : "https://s3.amazonaws.com"
    mandatory: false
  - name     : wikiaccesskey
    desc     : S3 access key, or Elasticsearch username for es backend
    mandatory: false
  - name     : wikisecret
    desc     : S3 secret key, or Elasticsearch password for es backend
    mandatory: false
  - name     : wikiregion
    desc     : S3 region
    mandatory: false
  - name     : wikiuseversion1
    desc     : Force S3 signature version 1
    example  : "false"
    mandatory: false
  - name     : wikiignorecertcheck
    desc     : Ignore TLS cert validation on S3 endpoint
    example  : "false"
    mandatory: false
  - name     : usewikigraph
    desc     : Enable the wiki graph layer explicitly. Also enabled automatically when FalkorDB host is provided.
    example  : "false"
    mandatory: false
  - name     : wikigraphcommunity
    desc     : Community detection algorithm for the wiki graph.
    example  : "louvain"
    mandatory: false
  - name     : wikigraphfalkorhost
    desc     : FalkorDB host for graph-backed wiki state/query.
    mandatory: false
  - name     : wikigraphfalkorport
    desc     : FalkorDB port for graph-backed wiki state/query.
    example  : "6379"
    mandatory: false
  - name     : wikigraphfalkorgraph
    desc     : FalkorDB graph name.
    example  : "mini_a_wiki"
    mandatory: false
  - name     : wikigraphfalkoruser
    desc     : FalkorDB username.
    mandatory: false
  - name     : wikigraphfalkorpass
    desc     : FalkorDB password.
    mandatory: false
  - name     : toolPrefix
    desc     : Optional prefix prepended to all tool names (e.g. "docs-" -> docs-list, docs-read, ...)
    example  : "wiki-"
    mandatory: false
  - name     : label
    desc     : Human-readable wiki label injected into templated tool descriptions
    example  : "Team wiki"
    mandatory: true
  - name     : wikiaccess
    desc     : Wiki access mode (`rw` or `ro`). Reindex requires `rw`.
    example  : "rw"
    mandatory: false
  - name     : wikiopsreadonly
    desc     : If true, disable write operations in this MCP server.
    example  : "false"
    mandatory: false
  - name     : wikimounts
    desc     : "SLON/JSON array of read-only wiki mounts: [{name, backend, root|bucket|prefix|url|...}]"
    example  : "[{name: 'team', backend: 'fs', root: './team-wiki'}]"
    mandatory: false

todo:
- Init
- (if    ): "isDef(args.onport)"
  ((then)):
  - (httpdStart   ): "${onport:-8080}"
  - (httpdHealthz ): "${onport:-8080}"
  - (httpdMetrics ): "${onport:-8080}"
  - (httpdMCP     ): "${onport:-8080}"
    ((toolPrefix )): "${toolPrefix:-}"
    ((tplDesc    )): true
    ((description)): &MCPSERVER
      serverInfo:
        name   : mcp-wiki-ops
        title  : OpenAF standalone MCP wiki ops server
        version: 1.0.0
    ((fnsMeta)): &MCPFNSMETA
      context:
        name       : context
        description: "[ORIENTATION] Get a compact overview of {{label}}: page count, sections, mounts, and recent changes. Call this once at the start of any wiki task."
        inputSchema:
          type      : object
          properties: {}
        annotations:
          title         : context
          readOnlyHint  : true
          idempotentHint: true

      lint:
        name       : lint
        description: "Run health checks on {{label}}. Fix all error-severity results before finishing. Warning and info items are advisory."
        inputSchema:
          type      : object
          properties:
            staleDays:
              type       : integer
              description: Stale-page threshold in days.
              default    : 90
            compact:
              type       : boolean
              description: Return compact issue output.
              default    : true
            severity:
              type       : string
              description: Optional severity filter (`error`, `warning`, `info`).
            type:
              type       : string
              description: Optional issue type filter.
            page:
              type       : string
              description: Optional page-path filter.
        annotations:
          title         : lint
          readOnlyHint  : true
          idempotentHint: true

      edit:
        name       : edit
        description: "Write or partially edit a page in {{label}}. Provide full frontmatter+body for new pages; use section= to replace only one heading's content on existing pages. Rejects writes to @mount/ paths (read-only mounts)."
        inputSchema:
          type      : object
          properties:
            path:
              type       : string
              description: "Target markdown page path. Must not start with @mount/ (mounts are read-only)."
            content:
              type       : string
              description: Page content or partial content for edit modes.
            append:
              type       : boolean
              description: Append content at end of existing page.
              default    : false
            lineInsert:
              type       : integer
              description: Insert before this 1-based line.
            lineStart:
              type       : integer
              description: Replace range start line (1-based).
            lineEnd:
              type       : integer
              description: Replace range end line (1-based).
            section:
              type       : string
              description: Replace section body under matching heading (efficient for targeted updates).
            raw:
              type       : boolean
              description: Content already contains frontmatter/body raw text.
              default    : false
          required  : [ path ]
        annotations:
          title         : edit
          readOnlyHint  : false
          idempotentHint: true

      maintain:
        name       : maintain
        description: "Run structural wiki maintenance in {{label}}: init (create section index), move (relocate + repair links), delete. All writes go to primary wiki only."
        inputSchema:
          type      : object
          properties:
            op:
              type       : string
              description: Operation name (`init`, `move`, `delete`).
            path:
              type       : string
              description: Source page path for `move`/`delete`, or section path for `init`.
            to:
              type       : string
              description: Target page path for `move`.
            leaveRedirect:
              type       : boolean
              description: Keep a redirect stub on source after move.
              default    : false
            overwrite:
              type       : boolean
              description: Allow move target overwrite.
              default    : false
          required  : [ op ]
        annotations:
          title         : maintain
          readOnlyHint  : false
          idempotentHint: true

      reindex:
        name       : reindex
        description: "Trigger a full wiki reindex in {{label}} (search indexes plus wiki graph; syncs FalkorDB when configured)."
        inputSchema:
          type      : object
        annotations:
          title         : reindex
          readOnlyHint  : false
          idempotentHint: true

      graph_build:
        name       : graph_build
        description: "Build wiki graph (structural always; semantic optional when configured). Syncs FalkorDB automatically when configured."
        inputSchema:
          type      : object
          properties:
            semantic:
              type   : boolean
              default: false

      graph_falkor:
        name       : graph_falkor
        description: "Query wiki graph in FalkorDB, or force a resync when called without a query."
        inputSchema:
          type      : object
          properties:
            query:
              type: string

    ((fns    )): &MCPFNS
      context     : Wiki context overview
      lint        : Wiki lint
      edit        : Wiki edit page
      maintain    : Wiki maintain
      reindex     : Wiki reindex
      graph_build : Wiki graph build
      graph_falkor: Wiki graph falkor
  ((else)):
  - (stdioMCP  ): *MCPSERVER
    ((toolPrefix)): "${toolPrefix:-}"
    ((tplDesc   )): true
    ((fnsMeta   )): *MCPFNSMETA
    ((fns       )): *MCPFNS

ojob:
  opacks      :
  - openaf     : 20250915
  - oJob-common: 20250914
  - mini-a     : 20260612
  catch       : printErrnl("[" + job.name + "] "); $err(exception, __, __, job.exec)
  logToConsole: false
  argsFromEnvs: true
  daemon      : true
  unique      :
    pidFile     : .mcp-wiki-ops.pid
    killPrevious: true

include:
- oJobMCP.yaml

jobs:
- name : Init
  check:
    in:
      wikibackend         : isString.default("fs")
      wikiroot            : isString.default(__)
      wikibucket          : isString.default(__)
      wikiprefix          : isString.default("wiki/")
      wikiurl             : isString.default("https://s3.amazonaws.com")
      wikiaccesskey       : isString.default(__)
      wikisecret          : isString.default(__)
      wikiregion          : isString.default(__)
      wikiuseversion1     : toBoolean.isBoolean.default(false)
      wikiignorecertcheck : toBoolean.isBoolean.default(false)
      usewikigraph        : toBoolean.isBoolean.default(false)
      wikigraphcommunity  : isString.default(__)
      wikigraphfalkorhost : isString.default(__)
      wikigraphfalkorport : toNumber.isNumber.default(__)
      wikigraphfalkorgraph: isString.default(__)
      wikigraphfalkoruser : isString.default(__)
      wikigraphfalkorpass : isString.default(__)
      label               : isString.default("wiki")
      wikiaccess          : isString.default("rw")
      wikiopsreadonly     : toBoolean.isBoolean.default(false)
      wikimounts          : isString.default(__)
  exec : | #js
    loadLib("mini-a-mcp-wiki.js")
    var access = String(args.wikiaccess || "rw").toLowerCase().trim() === "ro" ? "ro" : "rw"
    __miniAMcpWikiInit(args, {
      access   : access,
      readonly : args.wikiopsreadonly === true,
      logPrefix: "mcp-wiki-ops"
    })

- name : Wiki context overview
  check:
    in: {}
  exec : | #js
    return global.__wikiTool.wiki({ operation: "context" })

- name : Wiki lint
  check:
    in:
      staleDays: toNumber.isNumber.default(90)
      compact  : toBoolean.isBoolean.default(true)
      severity : isString.default("")
      type     : isString.default("")
      page     : isString.default("")
  exec : | #js
    var report = global.__wikiTool.wiki({
      operation: "lint",
      staleDays: args.staleDays,
      compact  : false
    })
    if (isString(report)) return report
    if (args.compact !== true) return report
    var issues = isArray(report.issues) ? report.issues : []
    if (args.severity.length > 0) issues = issues.filter(r => String(r.severity || "").toLowerCase() === args.severity.toLowerCase())
    if (args.type.length > 0) issues = issues.filter(r => String(r.type || "").toLowerCase() === args.type.toLowerCase())
    if (args.page.length > 0) issues = issues.filter(r => String(r.page || "").toLowerCase() === args.page.toLowerCase())
    return {
      summary: {
        pages   : isObject(report.summary) ? report.summary.pages : 0,
        errors  : issues.filter(r => r.severity === "error").length,
        warnings: issues.filter(r => r.severity === "warning").length,
        info    : issues.filter(r => r.severity === "info").length
      },
      count : issues.length,
      issues: issues
    }

- name : Wiki edit page
  check:
    in:
      path      : isString
      content   : isString.default("")
      append    : toBoolean.isBoolean.default(false)
      lineInsert: toNumber.isNumber.default(__)
      lineStart : toNumber.isNumber.default(__)
      lineEnd   : toNumber.isNumber.default(__)
      section   : isString.default("")
      raw       : toBoolean.isBoolean.default(false)
  exec : | #js
    var opts = {
      append    : args.append === true,
      lineInsert: isNumber(args.lineInsert) && args.lineInsert > 0 ? args.lineInsert : __,
      lineStart : isNumber(args.lineStart) && args.lineStart > 0 ? args.lineStart : __,
      lineEnd   : isNumber(args.lineEnd) && args.lineEnd > 0 ? args.lineEnd : __,
      section   : isString(args.section) && args.section.trim().length > 0 ? args.section.trim() : __
    }
    var hasPartial = opts.append === true || isNumber(opts.lineInsert) || isNumber(opts.lineStart) || isNumber(opts.lineEnd) || isString(opts.section)
    if (args.content.length === 0 && !hasPartial) return { ok: false, error: "content is required" }
    if (args.raw === true && !hasPartial) {
      return global.__wikiTool.wiki({
        operation: "write",
        path     : args.path,
        content  : args.content
      })
    }
    var res = global.__wikiManager.write(args.path, args.content, __, opts)
    if (!isObject(res)) return { ok: false, error: "edit failed" }
    return res

- name : Wiki maintain
  check:
    in:
      op           : isString
      path         : isString.default("")
      to           : isString.default("")
      leaveRedirect: toBoolean.isBoolean.default(false)
      overwrite    : toBoolean.isBoolean.default(false)
  exec : | #js
    var op = String(args.op).toLowerCase().trim()
    if (op === "init") {
      return global.__wikiTool.wiki({ operation: "init", path: args.path })
    }
    if (op === "delete") {
      return global.__wikiTool.wiki({ operation: "delete", path: args.path })
    }
    if (op === "move") {
      return global.__wikiTool.wiki({
        operation    : "move",
        path         : args.path,
        to           : args.to,
        leaveRedirect: args.leaveRedirect,
        overwrite    : args.overwrite
      })
    }
    return { ok: false, error: "unknown op: " + op + ". use init|move|delete" }

- name : Wiki reindex
  exec : | #js
    return global.__wikiTool.wiki({ operation: "reindex" })

- name : Wiki graph build
  check:
    in:
      semantic: toBoolean.isBoolean.default(false)
  exec : | #js
    return global.__wikiTool.graph({
      operation: "build",
      semantic : args.semantic === true
    })

- name : Wiki graph falkor
  check:
    in:
      query: isString.default("")
  exec : | #js
    return global.__wikiTool.graph({
      operation: "falkor",
      query    : args.query
    })
