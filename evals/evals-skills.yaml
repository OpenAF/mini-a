help:
  text   : |
    Run skill-specific evals for mini-a. Reads skill eval cases (each with a
    'skill' field), renders the skill to build the agent goal, runs the agent,
    and judges the result.

    Examples:
      ojob evals/evals-skills.yaml
      ojob evals/evals-skills.yaml casesFile=evals/cases/skills-cases.yaml updateGolden=true
  expects:
  - name     : casesFile
    desc     : Path to a YAML file with a top-level 'cases' array (skills-focused)
    example  : evals/cases/skills-cases.yaml
    mandatory: false
  - name     : judgeModel
    desc     : Model id for the judge LLM
    example  : haiku
    mandatory: false
  - name     : judgeProvider
    desc     : Provider prefix for the judge model
    mandatory: false
  - name     : goldenDir
    desc     : Directory for golden reference text files
    example  : evals/golden
    mandatory: false
  - name     : updateGolden
    desc     : Set to true to overwrite existing golden files
    example  : "false"
    mandatory: false
    options  : ["true", "false"]
  - name     : outputFile
    desc     : Path for the JSON report output
    example  : evals/skills-results.json
    mandatory: false
  - name     : tags
    desc     : Comma-separated tag filter
    example  : skills
    mandatory: false
  - name     : model
    desc     : Agent model id
    mandatory: false
  - name     : maxsteps
    desc     : Default maximum agent steps per case
    example  : "10"
    mandatory: false

init:
  casesFile    : evals/cases/skills-cases.yaml
  judgeModel   : ""
  judgeProvider: ""
  goldenDir    : evals/golden
  updateGolden : false
  outputFile   : evals/skills-results.json
  tags         : ""
  maxsteps     : 10

jobs:
- name: MiniAEval Skills::Init
  exec: |
    load("mini-a-eval.js")
    args.evalRunner = new MiniAEval()
    args.evalRunner.init({
      judgeModel   : args.judgeModel    || "",
      judgeProvider: args.judgeProvider || "",
      goldenDir    : args.goldenDir     || "evals/golden",
      updateGolden : toBoolean(args.updateGolden) === true,
      model        : args.model,
      maxsteps     : isDef(args.maxsteps) ? Number(args.maxsteps) : 10
    })
    var casesFile = args.casesFile || "evals/cases/skills-cases.yaml"
    if (!io.fileExists(casesFile)) throw new Error("Cases file not found: " + casesFile)
    var allCases = io.readFileYAML(casesFile).cases || []
    if (isString(args.tags) && args.tags.trim().length > 0) {
      var tagSet = args.tags.split(",").map(function(t) { return t.trim() })
      allCases = allCases.filter(function(c) {
        return isArray(c.tags) && c.tags.some(function(t) { return tagSet.indexOf(t) >= 0 })
      })
    }
    args.cases = allCases
    print("Loaded " + args.cases.length + " skill case(s) from " + casesFile)

- name: MiniAEval Skills::RunCases
  from: MiniAEval Skills::Init
  exec: |
    for (var i = 0; i < args.cases.length; i++) {
      var c = args.cases[i]
      var label = c.skill ? ("$" + c.skill) : c.id
      print("  Running [" + c.id + "] " + label + " ...")
      var result = args.evalRunner.runCase(c)
      var status = result.passed ? "PASS" : "FAIL"
      print("  [" + c.id + "] " + status + "  score=" + result.score.toFixed(3) + "  (" + result.reasoning + ")")
    }

- name: MiniAEval Skills::Report
  from: MiniAEval Skills::RunCases
  exec: |
    var summary = args.evalRunner.getSummary()
    print("")
    print("=== Skills Eval Summary ===")
    print("PASS: " + summary.pass + " / " + summary.total + "  avgScore=" + summary.avgScore)
    if (summary.fail > 0) print("FAIL: " + summary.fail)
    var outFile = args.outputFile || "evals/skills-results.json"
    args.evalRunner.writeReport(outFile)
    print("Report written to: " + outFile)
    if (summary.fail > 0) exit(1)

todo:
- MiniAEval Skills::Init
